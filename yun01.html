<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的专属回忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            background: linear-gradient(120deg, #fff8f8 0%, #f0f8fb 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        .barrage-container {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            height: 40px;
            z-index: 999;
            overflow: hidden;
            pointer-events: none;
        }
        .barrage-item {
            position: absolute;
            top: 0;
            left: 100%;
            height: 40px;
            line-height: 40px;
            font-size: 18px;
            color: #e63946;
            white-space: nowrap;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            animation: barrage 15s linear infinite;
        }
        @keyframes barrage {
            0% { left: 100%; }
            100% { left: -100%; }
        }
        .header {
            padding: 50px 20px 30px;
            text-align: center;
        }
        .avatar-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffb6c1;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.3);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .heart {
            width: 40px;
            height: 40px;
            background: #ff4757;
            transform: rotate(45deg);
            animation: beat 1.5s infinite ease-in-out;
        }
        .heart::before, .heart::after {
            content: '';
            width: 40px;
            height: 40px;
            background: #ff4757;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -20px; left: 0; }
        .heart::after { left: 20px; top: 0; }
        @keyframes beat {
            0%, 100% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(45deg) scale(1.1); }
        }
        .time-area {
            background: rgba(255, 255, 255, 0.9);
            max-width: 700px;
            margin: 0 auto 30px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.2);
            text-align: center;
        }
        .time-title {
            font-size: 20px;
            color: #ff9ff3;
            margin-bottom: 10px;
        }
        .time-count {
            font-size: 36px;
            font-weight: bold;
            color: #e63946;
            letter-spacing: 3px;
        }
        .func-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .func-card {
            width: 280px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.15);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .func-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.25);
        }
        .func-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
        }
        .log-icon { background: linear-gradient(45deg, #48dbfb, #0abde3); }
        .memory-icon { background: linear-gradient(45deg, #ff9ff3, #f368e0); }
        .message-icon { background: linear-gradient(45deg, #ff9f43, #ff3838); }
        .func-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .func-desc {
            font-size: 14px;
            color: #999;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
        }
        .photo-viewer {
            position: relative;
            max-width: 90%;
            max-height: 85vh;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }
        .photo-content {
            width: 100%;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f8f8;
        }
        .photo-content img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.5s ease;
        }
        .photo-content img:hover {
            transform: scale(1.02);
        }
        .photo-control {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: #f0f0f0;
        }
        .next-btn {
            padding: 10px 30px;
            background: linear-gradient(45deg, #ffb6c1, #ff69b4);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .next-btn:hover {
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            transform: scale(1.05);
        }
        .photo-index {
            margin-left: 20px;
            line-height: 40px;
            color: #666;
        }
        .message-board {
            max-width: 800px;
            margin: 0 auto 40px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.15);
            padding: 25px;
        }
        .board-title {
            font-size: 22px;
            color: #e63946;
            margin-bottom: 20px;
            text-align: center;
        }
        .message-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .message-text {
            font-size: 16px;
            color: #333;
        }
        .message-switch {
            width: 40px;
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }
        .switch-btn {
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 1px;
            transition: left 0.3s ease;
        }
        .message-switch.active {
            background: #ff69b4;
        }
        .message-switch.active .switch-btn {
            left: 21px;
        }
        /* 修改后的音乐按钮样式：右上角、不靠边、尺寸增大 */
        .music-control {
            position: fixed;
            top: 25px;     /* 距离顶部25px，不靠边 */
            right: 25px;   /* 距离右侧25px，不靠边 */
            width: 70px;   /* 尺寸增大 */
            height: 70px;  /* 尺寸增大 */
            background: linear-gradient(45deg, #ff4757, #ff69b4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
            z-index: 998;
            transition: all 0.3s ease;
        }
        .music-control:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="barrage-container" id="barrageContainer"></div>

    <div class="header">
        <div class="avatar-group">
            <div class="avatar">
                <img src="img/38aed8d883cf084454b530168828f914.jpg" alt="女生头像">
            </div>
            <div class="heart"></div>
            <div class="avatar">
                <img src="img/2e7b66f7e11ab6d913620556c3b30e24.jpg" alt="男生头像">
            </div>
        </div>
    </div>

    <div class="time-area">
        <div class="time-title">我们相爱已经</div>
        <div class="time-count" id="loveTime">0天 0时 0分 0秒</div>
    </div>

    <div class="func-area">
        <div class="func-card" onclick="openPhotoModal('log')">
            <div class="func-icon log-icon">📝</div>
            <div class="func-title">日志</div>
            <div class="func-desc">记录日常的小美好</div>
        </div>
        <div class="func-card" onclick="openPhotoModal('memory')">
            <div class="func-icon memory-icon">💌</div>
            <div class="func-title">我们之间的回忆</div>
            <div class="func-desc">珍藏每一个心动瞬间</div>
        </div>
        <div class="func-card" onclick="document.getElementById('messageBoard').scrollIntoView()">
            <div class="func-icon message-icon">💬</div>
            <div class="func-title">留言板</div>
            <div class="func-desc">写下想对彼此说的话</div>
        </div>
    </div>

    <div class="message-board" id="messageBoard">
        <div class="board-title">💖 专属留言板 💖</div>
        <div class="message-list" id="messageList">
            <div class="message-item">
                <div class="message-text">我不想离开你，第一次见面的时候我也说过～</div>
                <div class="message-switch" data-id="1" onclick="toggleBarrage(this)">
                    <div class="switch-btn"></div>
                </div>
            </div>
            <div class="message-item">
                <div class="message-text">好想一直和你在一起✨</div>
                <div class="message-switch active" data-id="2" onclick="toggleBarrage(this)">
                    <div class="switch-btn"></div>
                </div>
            </div>
            <div class="message-item">
                <div class="message-text">还想下次和你一起去吃土豆饼～</div>
                <div class="message-switch" data-id="3" onclick="toggleBarrage(this)">
                    <div class="switch-btn"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="photoModal">
        <span class="modal-close" onclick="closePhotoModal()">&times;</span>
        <div class="photo-viewer">
            <div class="photo-content" id="photoContent"></div>
            <div class="photo-control">
                <button class="next-btn" onclick="showNextPhoto()">看下一张</button>
                <div class="photo-index" id="photoIndex">1/3</div>
            </div>
        </div>
    </div>

    <!-- 音乐：默认显示 请先点击我 -->
    <audio id="bgMusic" loop></audio>
    <div class="music-control" id="musicBtn" onclick="toggleMusic()">请先点击我</div>

    <script>
        // ========== 配置 ==========
        const CONFIG = {
            loveStartDate: '2023-01-01 00:00:00',
            logPhotos: [
                'img/6f2bef5632847df8a590fedb2591a0ec.jpg',
                'img/1a163d908fbff61e1d410e6eae9b518c.jpg',
                'img/6af8036e83bd02137a3de41d359a32f7.jpg',
				'img/6e9e01b8f5a3e0a0ff85e4f18c8eac8f.jpg',
				'img/69ee515cadda88f9d5199f77c840cfb5.jpg',
				'img/73de395f97522049573d2c302bc6b3a4.jpg',
				'img/745adf600f0dad55768b28dc15558fe8.jpg',
				'img/61718426f1dd31f4ab5ebc9843f51695.jpg',
				'img/b60ee08cd3e878666067fce42799b9db.jpg',
				'img/c18a2c95df07da87d5281966811ac20d.jpg',
				'img/d05d912d75ac253011763cc382db443c.jpg',
				'img/89e273ab9a1012ee0409df4b09eecfbb.jpg',
				'img/60bd4be419fc47b1e844e90635dafc4c.jpg'
            ],
            memoryPhotos: [
                'img/0c1d8defb0745168652d3f7e05380546.jpg',
                'img/01a71be63614c433e762e56cc03a3c23.jpg',
                'img/2fcd61c1574d63ce2dde8e5a875e6782.jpg',
				'img/7ae894b1cf73a058a489ecea554742b2.jpg',
				'img/9bf1a70289d61b99e83c39ea5cf11a4b.jpg',
				'img/37ff134855817712bea6cdbc945335fb.jpg',
				'img/94e815e5934720fcfb6194a72afebaba.jpg',
				'img/974ab1cb1f2b1135904f4508ee6306cb.jpg',
				'img/b47cc30366c15a3b3f787c4b0c531665.jpg',
				'img/b45949936cd70c46631d2fbf984de04a.jpg',
				'img/cd906fe0188ae5b9d27b110ea2a12533.jpg',
				'img/d3989b2d1dcbd72f07cac9053610d7ed.jpg',
				'img/dede6ff1d18bf5c6ac6c6b4d31a8d2e7.jpg',
				'img/f4116d7091c555f62addfaac5e9769d7.jpg',
				'img/fad372661c6f33b3c408b1e70d8141d2.jpg',
            ],
            messages: [
                { id: 1, text: '我不想离开你，第一次见面的时候我也说过', showBarrage: false },
                { id: 2, text: '好想一直和你在一起✨', showBarrage: true },
                { id: 3, text: '还想下次和你一起去吃土豆饼', showBarrage: false },
            ],
            barrageSpeed: 15,
            musicVolume: 0.8
        };

        // 恋爱计时
        function updateLoveTime() {
            const start = new Date(CONFIG.loveStartDate);
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('loveTime').textContent = `${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }
        setInterval(updateLoveTime, 1000);
        updateLoveTime();

        // 照片
        let currentPhotoType = '', currentPhotoIndex = 0, currentPhotoList = [];
        function openPhotoModal(type) {
            currentPhotoType = type;
            currentPhotoIndex = 0;
            currentPhotoList = type === 'log' ? CONFIG.logPhotos : CONFIG.memoryPhotos;
            document.getElementById('photoContent').innerHTML = `<img src="${currentPhotoList[0]}">`;
            document.getElementById('photoIndex').textContent = `1/${currentPhotoList.length}`;
            document.getElementById('photoModal').style.display = 'flex';
        }
        function closePhotoModal() { document.getElementById('photoModal').style.display = 'none'; }
        function showNextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotoList.length;
            document.getElementById('photoContent').innerHTML = `<img src="${currentPhotoList[currentPhotoIndex]}">`;
            document.getElementById('photoIndex').textContent = `${currentPhotoIndex + 1}/${currentPhotoList.length}`;
        }

        // ====================== 音乐核心（HBuilderX专用）======================
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = CONFIG.musicVolume;
        bgMusic.src = "疑心病.mp3";
        
        const musicBtn = document.getElementById('musicBtn');
        let isMusicPlaying = false;

        // 点击页面任意位置 → 播放（HBuilderX必过）
        document.addEventListener('click', () => {
            if (!isMusicPlaying) {
                bgMusic.play();
                isMusicPlaying = true;
                musicBtn.textContent = '🔇';
            }
        }, { once: true });

        // 按钮控制
        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.textContent = '🎵';
            } else {
                bgMusic.play();
                musicBtn.textContent = '🔇';
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // 弹幕
        const barrageContainer = document.getElementById('barrageContainer');
        let barrageTimer = null;
        function toggleBarrage(switchEl) {
            switchEl.classList.toggle('active');
            const msg = CONFIG.messages.find(m => m.id == switchEl.dataset.id);
            msg.showBarrage = switchEl.classList.contains('active');
            clearInterval(barrageTimer);
            startBarrage();
        }
        function startBarrage() {
            const list = CONFIG.messages.filter(m => m.showBarrage);
            if(!list.length) return;
            let i = 0;
            barrageTimer = setInterval(() => {
                const item = document.createElement('div');
                item.className = 'barrage-item';
                item.textContent = list[i].text;
                item.style.top = Math.random()*10 + 'px';
                item.style.color = ['#e63946','#ff69b4','#ff9ff3'][Math.floor(Math.random()*3)];
                barrageContainer.appendChild(item);
                setTimeout(()=>item.remove(), 15000);
                i = (i+1) % list.length;
            }, 5000);
        }
        startBarrage();

        window.onclick = e => e.target == document.getElementById('photoModal') && closePhotoModal();
    </script>
</body>
</html>
